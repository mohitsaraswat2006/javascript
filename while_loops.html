        //===============================REVERSE OF A NUMBER=========================================

        let num = parseInt(prompt("enter the number to reverse the digits :- "));
        let rev = 0;
        while (num > 0) {
            let last_digit = num%10;
            rev = rev*10+last_digit;
            num = parseInt(num/10);
        }
        document.writeln("reverse of that number is : - ",rev)
