        //========================small practice for arrays==================
        const products = [
            ["./img/img1.jpg", "Product 1", "High quality product 1", 1],
            ["./img/img2.jpg", "Product 2", "High quality product 2", 24.99],
            ["./img/img3.jpg", "Product 3", "High quality product 3", 15.99],
            ["./img/img4.jpg", "Product 4", "High quality product 4", 29.99],

            ["./img/img9.jpg", "Product 9", "High quality product 9", 16.99],
            ["./img/img10.jpg", "Product 10", "High quality product 10", 27.99]
        ];
        document.writeln('<div class = "container">')
        let total_products = products.length
        for (let i = 0; i < total_products; i++) {
            document.writeln(`
            <div class = "item">
                <img src ="${products[i][0]}" height = "200px" width = "100px">
                <h2>${products[i][1]}</h2>
                <p>${products[i][2]}</p>
                <h3>Rs.${products[i][3]}</h3>
                <button>Add to Cart</button>
                </div>
            `);
        }
        document.writeln("</div>")
